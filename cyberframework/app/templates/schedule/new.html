{% extends "base.html" %}
{% block title %}New Scheduled Scan{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-clock-history"></i> New Scheduled Scan</h4>

<div class="card-dark" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary">Schedule Name</label>
                <input type="text" name="name" class="form-control bg-dark text-light border-secondary"
                       placeholder="e.g. Weekly Production Scan" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Target</label>
                <input type="text" name="target" class="form-control bg-dark text-light border-secondary"
                       value="localhost" placeholder="hostname or IP">
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Scan Type</label>
                <select name="scan_type" class="form-select bg-dark text-light border-secondary">
                    <option value="full">Full Scan</option>
                    <option value="quick">Quick Scan</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Frequency</label>
                <select name="frequency" class="form-select bg-dark text-light border-secondary">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>
            <button type="submit" class="btn btn-accent">Create Schedule</button>
            <a href="{{ url_for('schedule.list_schedules') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
