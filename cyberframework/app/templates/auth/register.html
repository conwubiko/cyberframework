{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-logo">
        <h1><i class="bi bi-shield-check"></i> CROF</h1>
        <p class="text-secondary">Create your account</p>
    </div>
    <div class="card-dark">
        <div class="card-header text-center">Register</div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary">Email</label>
                    <input type="email" name="email" class="form-control form-control-dark" required
                           value="{{ request.form.get('email', '') }}">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Username</label>
                    <input type="text" name="username" class="form-control form-control-dark" required
                           value="{{ request.form.get('username', '') }}">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Organisation</label>
                    <input type="text" name="organisation" class="form-control form-control-dark"
                           value="{{ request.form.get('organisation', '') }}">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" name="password" class="form-control form-control-dark" required minlength="8">
                </div>
                <button type="submit" class="btn btn-accent w-100">Create Account</button>
            </form>
            <p class="text-center mt-3 text-secondary">
                Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent);">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
