<html>
<body style="font-family: Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px;">
<div style="max-width: 500px; margin: 0 auto; background: #16213e; border-radius: 8px; padding: 30px;">
    <h2 style="color: #00BCD4;">CROF Backup {{ 'Completed' if job.status == 'completed' else 'Failed' }}</h2>
    <p>Hi {{ user.username }},</p>
    <p>Your backup job has finished with status: <strong style="color: {{ '#2ea043' if job.status == 'completed' else '#f85149' }};">{{ job.status }}</strong></p>
    <table style="width: 100%; border-collapse: collapse; margin: 15px 0;">
        <tr><td style="padding: 5px; color: #8b949e;">Provider:</td><td style="padding: 5px;">{{ job.provider }}</td></tr>
        <tr><td style="padding: 5px; color: #8b949e;">Target:</td><td style="padding: 5px;">{{ job.target_name }}</td></tr>
    </table>
    <p style="color: #8b949e; font-size: 12px;">This is an automated notification from CROF.</p>
</div>
</body>
</html>
