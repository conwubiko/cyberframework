{% extends "base.html" %}
{% block title %}New Backup{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h4 class="mb-4"><i class="bi bi-cloud-upload"></i> New Backup Job</h4>
        <div class="card-dark">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Job Name</label>
                        <input type="text" name="target_name" class="form-control form-control-dark" required
                               placeholder="e.g. Daily server backup">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Provider</label>
                        <select name="provider" class="form-select form-select-dark" id="providerSelect" onchange="toggleProvider()">
                            <option value="rsync">rsync</option>
                            <option value="veeam">Veeam</option>
                            <option value="aws">AWS Backup</option>
                            <option value="azure">Azure Backup</option>
                        </select>
                    </div>

                    <!-- rsync config -->
                    <div id="config-rsync">
                        <div class="mb-3">
                            <label class="form-label text-secondary">Source Path</label>
                            <input type="text" name="rsync_source" class="form-control form-control-dark" value="." placeholder="/data/critical">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Destination Path</label>
                            <input type="text" name="rsync_dest" class="form-control form-control-dark" value="/tmp/backup" placeholder="/mnt/backup">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Options</label>
                            <input type="text" name="rsync_options" class="form-control form-control-dark" value="-avz">
                        </div>
                    </div>

                    <!-- Veeam config -->
                    <div id="config-veeam" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label text-secondary">Veeam Host</label>
                            <input type="text" name="veeam_host" class="form-control form-control-dark" placeholder="veeam-server.local">
                        </div>
                        <div class="row mb-3">
                            <div class="col-8">
                                <label class="form-label text-secondary">Username</label>
                                <input type="text" name="veeam_user" class="form-control form-control-dark">
                            </div>
                            <div class="col-4">
                                <label class="form-label text-secondary">Port</label>
                                <input type="number" name="veeam_port" class="form-control form-control-dark" value="9419">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Password</label>
                            <input type="password" name="veeam_pass" class="form-control form-control-dark">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Job Name</label>
                            <input type="text" name="veeam_job" class="form-control form-control-dark" placeholder="Backup Job 1">
                        </div>
                    </div>

                    <!-- AWS config -->
                    <div id="config-aws" style="display:none;">
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-secondary">Access Key</label>
                                <input type="text" name="aws_key" class="form-control form-control-dark">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary">Secret Key</label>
                                <input type="password" name="aws_secret" class="form-control form-control-dark">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-secondary">Region</label>
                                <input type="text" name="aws_region" class="form-control form-control-dark" value="us-east-1">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary">Vault Name</label>
                                <input type="text" name="aws_vault" class="form-control form-control-dark" value="Default">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Resource ARN</label>
                            <input type="text" name="aws_arn" class="form-control form-control-dark">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">IAM Role ARN</label>
                            <input type="text" name="aws_role" class="form-control form-control-dark">
                        </div>
                    </div>

                    <!-- Azure config -->
                    <div id="config-azure" style="display:none;">
                        <p class="text-secondary">Azure Backup integration requires additional setup. Configure in production with azure-mgmt-recoveryservices.</p>
                    </div>

                    <button type="submit" class="btn btn-accent w-100 mt-2">
                        <i class="bi bi-play-fill"></i> Start Backup
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleProvider() {
    const val = document.getElementById('providerSelect').value;
    ['rsync','veeam','aws','azure'].forEach(p => {
        document.getElementById('config-' + p).style.display = p === val ? 'block' : 'none';
    });
}
</script>
{% endblock %}
